<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vanilla Fragrances - AromaLux</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><nav><div class="navbar"><a href="/" class="logo">✨ AromaLux</a><ul class="nav-links"><li><a href="/">Home</a></li><li><a href="/perfumes">Perfumes</a></li></ul><div class="nav-right"><a href="/cart" class="nav-icon">🛒<span class="cart-badge">0</span></a></div></div></nav><section class="hero"><div class="container"><h1>🍦 Vanilla Fragrances</h1><p>Sweet and creamy vanilla perfumes for comfort and elegance</p></div></section><section class="section"><div class="container"><div style="display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap"><button class="btn btn-primary" onclick="filterByGender('all')" data-filter="all">All</button><button class="btn btn-outline" onclick="filterByGender('male')" data-filter="male">👨 Male</button><button class="btn btn-outline" onclick="filterByGender('female')" data-filter="female">👩 Female</button><button class="btn btn-outline" onclick="filterByGender('unisex')" data-filter="unisex">👥 Unisex</button><select id="sortSelect" onchange="changeSortOrder()"><option value="latest">Latest</option><option value="price_low">Price: Low to High</option><option value="price_high">Price: High to Low</option></select></div><div class="products-grid" id="products-grid"></div><div id="pagination" style="text-align:center;margin-top:2rem"></div></div></section><script src="{{ url_for('static', filename='script.js') }}"></script><script>const classification='vanilla';let currentGenderFilter='all',currentPage=1,currentSort='latest';function filterByGender(g){currentGenderFilter=g;currentPage=1;loadProducts();document.querySelectorAll('[data-filter]').forEach(b=>{b.classList.toggle('btn-primary',b.dataset.filter===g);b.classList.toggle('btn-outline',b.dataset.filter!==g);});}function changeSortOrder(){currentSort=document.getElementById('sortSelect').value;currentPage=1;loadProducts();}function loadProducts(){fetch(`/api/classifications/${classification}?page=${currentPage}&gender=${currentGenderFilter}&sort=${currentSort}`).then(r=>r.json()).then(d=>{renderProducts(d.perfumes);renderPagination(d.pagination);});}function renderProducts(p){document.getElementById('products-grid').innerHTML=p.map(x=>`<div class="product-card"><div class="product-image" data-icon="💎">${x.discount_percent>0?`<span class="discount-badge">-${x.discount_percent}%</span>`:''}<span style="position:absolute;top:10px;right:10px;background:var(--magenta);color:white;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.75rem">${x.gender==='male'?'👨':x.gender==='female'?'👩':'👥'} ${x.gender.toUpperCase()}</span></div><h3>${x.perfume_name}</h3><p>${x.brand_name}</p><div class="product-rating">⭐${x.rating}</div><div class="product-price">${x.discount_percent>0?`<span style="text-decoration:line-through">$${parseFloat(x.price).toFixed(2)}</span><span>$${parseFloat(x.discounted_price).toFixed(2)}</span>`:`<span>$${parseFloat(x.price).toFixed(2)}</span>`}</div><div class="product-actions"><button onclick="addToCart(${x.perfume_id})">🛒</button><button onclick="toggleFavorite(${x.perfume_id})">♡</button></div></div>`).join('');}function renderPagination(p){let h='';if(p.page>1)h+=`<button onclick="goToPage(${p.page-1})">← Prev</button>`;for(let i=1;i<=p.pages&&i<=5;i++)h+=`<button onclick="goToPage(${i})" style="font-weight:${i===p.page?'bold':'normal'}">${i}</button>`;if(p.page<p.pages)h+=`<button onclick="goToPage(${p.page+1})">Next →</button>`;document.getElementById('pagination').innerHTML=h;}function goToPage(p){currentPage=p;loadProducts();window.scrollTo(0,0);}loadProducts();</script></body></html>
