<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AromaLux</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }
        .profile-sidebar {
            background: var(--white);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            height: fit-content;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #E84B8A, #8B5CF6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
        }
        .profile-menu {
            list-style: none;
        }
        .profile-menu li {
            margin-bottom: 0.5rem;
        }
        .profile-menu a {
            display: block;
            padding: 0.75rem;
            border-radius: 8px;
            transition: var(--transition);
        }
        .profile-menu a:hover {
            background: rgba(232, 75, 138, 0.1);
        }
        .profile-content {
            background: var(--white);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .profile-section {
            margin-bottom: 2rem;
        }
        .profile-section h3 {
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
        }
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .profile-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="navbar">
            <a href="/" class="logo">✨ AromaLux</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/perfumes">Perfumes</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
            <div class="nav-right">
                <a href="/cart" class="nav-icon">🛒 <span class="cart-badge">0</span></a>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="container">
        <h1>My Account</h1>
        
        <div class="profile-container">
            <aside class="profile-sidebar">
                <div class="profile-avatar">👤</div>
                <h3 style="text-align: center; margin-bottom: 1.5rem;">Account Menu</h3>
                <ul class="profile-menu">
                    <li><a href="#profile">Profile</a></li>
                    <li><a href="#addresses">Addresses</a></li>
                    <li><a href="#orders">Orders</a></li>
                    <li><a href="#favorites">Favorites</a></li>
                    <li><a href="/logout">Logout</a></li>
                </ul>
            </aside>
            
            <main class="profile-content">
                <div id="profile"></div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>About AromaLux</h3>
                    <p>Luxury fragrances worldwide.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        loadUserProfile();
    </script>
</body>
</html>
