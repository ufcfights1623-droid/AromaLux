<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Powdery Fragrances - AromaLux</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><nav><div class="navbar"><a href="/" class="logo">✨ AromaLux</a><div class="nav-right"><a href="/cart">🛒<span class="cart-badge">0</span></a></div></div></nav><section class="hero"><h1>✨ Powdery Fragrances</h1><p>Soft, delicate, and powdery fragrances with a gentle touch</p></section><section class="section"><div style="display:flex;gap:1rem;margin-bottom:2rem"><button class="btn btn-primary" onclick="filterByGender('all')">All</button><button class="btn btn-outline" onclick="filterByGender('male')">👨</button><button class="btn btn-outline" onclick="filterByGender('female')">👩</button><button class="btn btn-outline" onclick="filterByGender('unisex')">👥</button><select onchange="changeSortOrder()"><option>Latest</option></select></div><div class="products-grid" id="products-grid"></div><div id="pagination"></div></section><script src="{{ url_for('static', filename='script.js') }}"></script><script>const c='powdery';let g='all',p=1,s='latest';function filterByGender(x){g=x;p=1;load();}function changeSortOrder(){s='latest';p=1;load();}function load(){fetch(`/api/classifications/${c}?page=${p}&gender=${g}&sort=${s}`).then(r=>r.json()).then(d=>{let h=d.perfumes.map(x=>`<div class="product-card"><div class="product-image">💎${x.discount_percent>0?`<span style="background:red;color:white;padding:0.25rem">-${x.discount_percent}%</span>`:''}</div><h3>${x.perfume_name}</h3><p>${x.brand_name}</p><div>⭐${x.rating}</div><button onclick="addToCart(${x.perfume_id})">🛒</button></div>`).join('');document.getElementById('products-grid').innerHTML=h;});}load();</script></body></html>
