<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - AromaLux</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .blog-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .blog-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #E84B8A, #8B5CF6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .blog-content {
            padding: 1.5rem;
        }
        .blog-content h3 {
            margin-bottom: 0.75rem;
        }
        .blog-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="navbar">
            <a href="/" class="logo">✨ AromaLux</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/perfumes">Perfumes</a></li>
                <li><a href="/blogs">Blog</a></li>
            </ul>
            <div class="nav-right">
                <a href="/cart" class="nav-icon">🛒 <span class="cart-badge">0</span></a>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="container">
        <h1>Fragrance Blog</h1>
        <p style="color: var(--text-light); margin-bottom: 2rem;">Expert tips, guides, and stories about luxury fragrances</p>
        
        <div class="blogs-grid"></div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>About AromaLux</h3>
                    <p>Luxury fragrances worldwide.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        loadBlogs();
    </script>
</body>
</html>
