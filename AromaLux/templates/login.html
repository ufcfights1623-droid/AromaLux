<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AromaLux</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
        }
        .auth-container h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .auth-container p {
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-links a {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="navbar">
            <a href="/" class="logo">✨ AromaLux</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/perfumes">Perfumes</a></li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="auth-container">
        <h1>Welcome Back</h1>
        <p>Sign in to your AromaLux account</p>
        
        <form id="login-form" onsubmit="submitLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign In</button>
        </form>
        
        <div class="auth-links">
            <p>Don't have an account? <a href="/signup">Sign up here</a></p>
            <p><a href="#">Forgot password?</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        async function submitLogin(event) {
            event.preventDefault();
            const form = event.target;
            const email = form.email.value;
            const password = form.password.value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    showNotification('Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = '/profile';
                    }, 1500);
                } else {
                    const error = await response.json();
                    showNotification(error.error || 'Login failed', 'error');
                }
            } catch (error) {
                showNotification('Error during login', 'error');
            }
        }
    </script>
</body>
</html>
