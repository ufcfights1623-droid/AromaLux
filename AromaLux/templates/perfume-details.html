<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume Details - AromaLux</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 2rem 0;
        }
        .detail-image {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #f5f3f8, #e8e8e8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
        }
        .detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .detail-brand {
            color: var(--text-light);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .detail-rating {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .detail-price {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .detail-actions {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }
        .size-selector {
            margin: 1.5rem 0;
        }
        .size-options {
            display: flex;
            gap: 1rem;
        }
        .size-option {
            padding: 0.75rem 1rem;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }
        .size-option.active {
            border-color: var(--primary-color);
            background: rgba(232, 75, 138, 0.1);
        }
        .fragrance-notes {
            background: rgba(232, 75, 138, 0.05);
            padding: 1.5rem;
            border-radius: 15px;
            margin: 2rem 0;
        }
        .notes-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        .note-box {
            padding: 1rem;
            background: var(--white);
            border-radius: 10px;
            text-align: center;
        }
        .note-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }
        .note-content {
            font-weight: 500;
            color: var(--text-dark);
        }
        .reviews-section {
            margin-top: 3rem;
        }
        .review-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
        }
        @media (max-width: 768px) {
            .detail-container {
                grid-template-columns: 1fr;
            }
            .detail-image {
                height: 300px;
            }
            .notes-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="navbar">
            <a href="/" class="logo">✨ AromaLux</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/perfumes">Perfumes</a></li>
                <li><a href="/collections">Collections</a></li>
                <li><a href="/blogs">Blog</a></li>
            </ul>
            <div class="nav-right">
                <a href="/cart" class="nav-icon">🛒 <span class="cart-badge">0</span></a>
                <a href="/profile" class="nav-icon">👤</a>
            </div>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="container">
        <a href="/perfumes" style="color: var(--primary-color); margin: 1rem 0; display: inline-block;">← Back to Perfumes</a>
        
        <div id="perfume-detail" class="detail-container">
            <!-- Loaded via JavaScript -->
        </div>

        <!-- Similar Perfumes -->
        <section class="section">
            <div class="section-title">
                <h2>Similar Perfumes</h2>
            </div>
            <div class="products-grid" id="similar-perfumes"></div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>About AromaLux</h3>
                    <p>Luxury fragrances worldwide.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        const perfumeId = parseInt('{{ perfume_id }}');
        
        async function loadPerfumeDetail() {
            try {
                const response = await fetch(`/api/perfumes/${perfumeId}`);
                const perfume = await response.json();
                
                const container = document.getElementById('perfume-detail');
                container.innerHTML = `
                    <div class="detail-image">💎</div>
                    <div class="detail-info">
                        <h1>${perfume.perfume_name}</h1>
                        <p class="detail-brand">${perfume.brand_name}</p>
                        <div class="detail-rating">
                            <span>⭐ ${perfume.rating}</span>
                            <span>(${perfume.review_count} reviews)</span>
                        </div>
                        
                        <p>${perfume.description}</p>
                        
                        <div class="detail-price">$${perfume.discounted_price.toFixed(2)}</div>
                        
                        <div class="size-selector">
                            <label>Select Size:</label>
                            <div class="size-options">
                                ${perfume.bottle_sizes.map(size => `
                                    <button class="size-option ${size === '50ml' ? 'active' : ''}" 
                                        onclick="selectSize(this, '${size}')">${size}</button>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="detail-actions">
                            <button class="btn btn-primary" style="flex: 1; padding: 1rem;" 
                                onclick="addToCart(${perfumeId})">🛒 Add to Cart</button>
                            <button class="btn btn-outline" style="width: 50px; height: 50px;" 
                                onclick="toggleFavorite(${perfumeId})">♡</button>
                        </div>
                    </div>
                `;
                
                // Load fragrance notes
                const notesHtml = `
                    <div class="fragrance-notes">
                        <h3>Fragrance Composition</h3>
                        <div class="notes-row">
                            <div class="note-box">
                                <div class="note-label">Top Notes</div>
                                <div class="note-content">${perfume.top_notes}</div>
                            </div>
                            <div class="note-box">
                                <div class="note-label">Middle Notes</div>
                                <div class="note-content">${perfume.middle_notes}</div>
                            </div>
                            <div class="note-box">
                                <div class="note-label">Base Notes</div>
                                <div class="note-content">${perfume.base_notes}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += notesHtml;
                
                // Load reviews
                const reviewsHtml = `
                    <div class="reviews-section">
                        <h2>Customer Reviews</h2>
                        ${perfume.reviews.length > 0 ? perfume.reviews.map(review => `
                            <div class="review-card">
                                <div style="display: flex; justify-content: space-between;">
                                    <strong>${review.first_name} ${review.last_name}</strong>
                                    <span>⭐ ${review.rating}</span>
                                </div>
                                <p>${review.review_text}</p>
                                <small style="color: var(--text-light);">${new Date(review.created_at).toLocaleDateString()}</small>
                            </div>
                        `).join('') : '<p>No reviews yet. Be the first to review!</p>'}
                    </div>
                `;
                
                container.innerHTML += reviewsHtml;
                
                // Load similar perfumes
                loadSimilarPerfumes(perfumeId);
            } catch (error) {
                console.error('Error loading perfume:', error);
            }
        }
        
        async function loadSimilarPerfumes(perfumeId) {
            try {
                const response = await fetch(`/api/recommendation/similar/${perfumeId}`);
                const similar = await response.json();
                
                const container = document.getElementById('similar-perfumes');
                container.innerHTML = similar.map(perfume => `
                    <div class="product-card" data-id="${perfume.perfume_id}">
                        <div class="product-image">💎</div>
                        <h3 class="product-name">${perfume.perfume_name}</h3>
                        <p class="product-brand">${perfume.brand_name}</p>
                        <div class="product-price">$${perfume.discounted_price.toFixed(2)}</div>
                        <button class="btn-add-cart" onclick="addToCart(${perfume.perfume_id})">Add to Cart</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading similar perfumes:', error);
            }
        }
        
        function selectSize(element, size) {
            document.querySelectorAll('.size-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
        
        loadPerfumeDetail();
    </script>
</body>
</html>
