<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Chypré - AromaLux</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><nav><a href="/">✨ AromaLux</a></nav><h1>🌾 Chypré</h1><div class="products-grid" id="p"></div><script src="{{ url_for('static', filename='script.js') }}"></script><script>fetch(`/api/classifications/chypre?page=1&gender=all&sort=latest`).then(r=>r.json()).then(d=>{document.getElementById('p').innerHTML=d.perfumes.map(x=>`<div class="product-card"><h3>${x.perfume_name}</h3><button onclick="addToCart(${x.perfume_id})">🛒</button></div>`).join('');});</script></body></html>
